syntax = "proto3";

package drifter.mud;

option go_package = "github.com/solo-seven/platform.drifter.solo7.media/generated/proto";

// MUD Service Definition
service MUDService {
  // Player Actions (gRPC)
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ServerList(ServerListRequest) returns (ServerListResponse);
  rpc AvatarConnect(AvatarConnectRequest) returns (AvatarConnectResponse);
  rpc AvatarCommand(AvatarCommandRequest) returns (AvatarCommandResponse);
  rpc AvatarMessages(AvatarMessageRequest) returns (AvatarMessageResponse);

  // Admin Commands
  rpc AdminCommand(AdminCommandRequest) returns (AdminCommandResponse);
}

// Request/Response Messages
// Admin
message AdminCommandRequest {
  string admin_id = 1;
  string command = 2;
  map<string, string> parameters = 3;
}

message AdminCommandResponse {
  bool success = 1;
  string message = 2;
  string result = 3;
}

// Login
message LoginRequest {
  string player_name = 1;
  string character_name = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
}

message ServerListRequest {
  string region = 1;
  map<string, string> filters = 2;
}

message ServerListResponse {
  repeated ServerInfo servers = 1;
}

message AvatarConnectRequest {
  string server_id = 1;
  string avatar_id = 2;
}

message AvatarConnectResponse {
  string status = 1;
  string message = 2;
  AvatarState avatar_state = 3;
}

message AvatarCommandRequest {
  AvatarAction action = 1;
}

message AvatarCommandResponse {
  string avatar_id = 1;
  string result = 2;
}

message AvatarMessageRequest {
  string avatar_id = 1;
}

message AvatarMessageResponse {
  string avatar_id = 1;
  repeated ServerMessage messages = 2;
}

message ServerMessage {
  string server_id = 1;
  string message = 2;
}

// World Domain Model
message World {
  string world_id = 1;
  repeated string world_map = 2;
}
message Area {
  string area_id = 1;
  repeated Edge boundary = 2;
  repeated string structures = 3;
}
message Structure {
  string structure_id = 1;
  repeated Edge walls = 2;
}
message ItemTemplate {
  string item_template_id = 1;
}
message Item {
  string item_id = 1;
  string item_template_id = 2;
  uint32 quantity = 3;
}

message AvatarAction {
  string action_id = 1;
  string avatar_id = 2;
  map<string, string> action_parameters = 3;
}

// Data components
message ServerInfo {
  string server_id = 1;
  string server_name = 2;
  string description = 3;
  string connection_string = 4;
  repeated AvatarInfo avatars = 5;
}

message AvatarInfo {
  string avatar_id = 1;
  string avatar_name = 2;
  string summary = 3;
}

message AvatarState {
  string avatar_id = 1;
  string server_id = 2;
  string current_region = 3;
  Point current_location = 4;
}

message Edge {
  Pair a = 1;
  Pair b = 2;
}
message Pair {
  uint64 x = 1;
  uint64 y = 2;
}
message Vector {
  Point start = 1;
  Point end = 2;
}
message Point {
  uint64 x = 1;
  uint64 y = 2;
  uint64 z = 3;
}