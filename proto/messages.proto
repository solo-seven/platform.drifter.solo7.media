syntax = "proto3";

package drifter.platform;

option go_package = "github.com/solo-seven/platform.drifter.solo7.media";

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

// Core message types
message NetworkMessage {
  MessageType type = 1;
  string id = 2;
  google.protobuf.Timestamp timestamp = 3;
  google.protobuf.Any data = 4;
}

enum MessageType {
  // Client → Server
  PLAYER_INPUT = 0;
  CHAT_MESSAGE = 1;
  ADMIN_COMMAND = 2;
  
  // Server → Client
  STATE_UPDATE = 3;
  AESTHETIC_EVENT = 4;
  SYSTEM_NOTIFICATION = 5;
  
  // Bidirectional
  HEARTBEAT = 6;
  CONNECTION_NEGOTIATION = 7;
}

// Entity and Component messages
message Entity {
  string id = 1;
  map<string, Component> components = 2;
  EntityMetadata metadata = 3;
}

message Component {
  string type = 1;
  google.protobuf.Any data = 2;
  int32 version = 3;
}

message EntityMetadata {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Timestamp updated_at = 2;
  int32 version = 3;
}

// Component data types
message TransformComponent {
  Vector3 position = 1;
  Vector3 rotation = 2;
  Vector3 scale = 3;
}

message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message PhysicsComponent {
  Bounds collision_bounds = 1;
  double mass = 2;
  Vector3 velocity = 3;
  bool is_static = 4;
}

message Bounds {
  Vector3 min = 1;
  Vector3 max = 2;
}

message RenderableComponent {
  string asset_id = 1;
  RenderingHints rendering_hints = 2;
  optional string animation_set_id = 3;
  map<string, string> material_overrides = 4;
}

message RenderingHints {
  repeated LODLevel lod_levels = 1;
  double cull_distance = 2;
  bool shadow_casting = 3;
  bool static_batching = 4;
}

message LODLevel {
  int32 level = 1;
  double distance = 2;
  string asset_id = 3;
  int32 polygon_count = 4;
}

message GameplayComponent {
  map<string, double> stats = 1;
  repeated Ability abilities = 2;
  Inventory inventory = 3;
  repeated StatusEffect status_effects = 4;
}

message Ability {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 cooldown_nanos = 4;
  map<string, string> properties = 5;
}

message Inventory {
  repeated Item items = 1;
  int32 max_slots = 2;
  double max_weight = 3;
}

message Item {
  string id = 1;
  string name = 2;
  string description = 3;
  double weight = 4;
  map<string, string> properties = 5;
  int32 quantity = 6;
}

message StatusEffect {
  string id = 1;
  string name = 2;
  int64 duration_nanos = 3;
  google.protobuf.Timestamp start_time = 4;
  map<string, string> properties = 5;
}

// Player input messages
message PlayerInputMessage {
  string player_id = 1;
  string input_type = 2;
  map<string, string> data = 3;
}

// State update messages
message StateUpdateMessage {
  string region_id = 1;
  repeated Entity entities = 2;
  repeated StateChange changes = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message StateChange {
  string entity_id = 1;
  string component = 2;
  map<string, string> changes = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// World state messages
message WorldState {
  map<string, RegionState> regions = 1;
  GlobalGameState global_state = 2;
  map<string, PlayerState> player_states = 3;
}

message RegionState {
  map<string, Entity> entities = 1;
  EnvironmentData environment_data = 2;
  repeated string active_rules = 3;
  repeated InterestArea interest_areas = 4;
}

message EnvironmentData {
  string weather = 1;
  string time_of_day = 2;
  map<string, string> properties = 3;
}

message GlobalGameState {
  google.protobuf.Timestamp game_time = 1;
  string game_phase = 2;
  map<string, string> properties = 3;
}

message PlayerState {
  string player_id = 1;
  string current_region = 2;
  Vector3 position = 3;
  map<string, string> properties = 4;
  google.protobuf.Timestamp last_seen = 5;
}

message InterestArea {
  Vector3 center = 1;
  double radius = 2;
  int32 priority = 3;
}

// Game rules and actions
message GameRule {
  string id = 1;
  repeated EventTrigger triggers = 2;
  repeated Condition conditions = 3;
  repeated Action actions = 4;
  int32 priority = 5;
}

message EventTrigger {
  string type = 1;
  map<string, string> condition = 2;
}

message Condition {
  string type = 1;
  string property = 2;
  string operator = 3;
  string value = 4;
}

message Action {
  string type = 1;
  string target = 2;
  map<string, string> properties = 3;
}

message ActionResult {
  repeated StateChange world_state_changes = 1;
  repeated ClientNotification client_notifications = 2;
  repeated AestheticEvent aesthetic_events = 3;
}

message ClientNotification {
  string player_id = 1;
  string type = 2;
  string message = 3;
  map<string, string> properties = 4;
}

message AestheticEvent {
  string type = 1;
  string entity_id = 2;
  map<string, string> properties = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// Connection and session messages
message ConnectionNegotiation {
  string client_version = 1;
  string player_id = 2;
  map<string, string> capabilities = 3;
}

message Heartbeat {
  string connection_id = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message ChatMessage {
  string player_id = 1;
  string message = 2;
  string channel = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message AdminCommand {
  string player_id = 1;
  string command = 2;
  repeated string arguments = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message SystemNotification {
  string type = 1;
  string message = 2;
  map<string, string> properties = 3;
  google.protobuf.Timestamp timestamp = 4;
}

